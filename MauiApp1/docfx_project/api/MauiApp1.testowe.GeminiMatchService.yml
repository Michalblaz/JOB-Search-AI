  summary: Wysyła oferty do Gemini i zapisuje wynik oraz uzasadnienie bezpośrednio w obiektach <xref href="MauiApp1.testowe.JobOffer" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    Metoda dzieli oferty na paczki i ponawia zapytania przy limitach lub chwilowej niedostępności API. Odpowiedź modelu

    musi być parsowalnym JSON-em, ponieważ UI potrzebuje stabilnych pól <code>offerId</code>, <code>score</code> i <code>reason</code>.
  example: []
  syntax:
    content: public Task<bool> ScoreOffersAsync(JobSearchService searchService, IReadOnlyList<JobOffer> offers)
